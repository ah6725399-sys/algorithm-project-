
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #game { padding: 16px 0; }
  #header { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 16px; text-align: center; min-width: 70px; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); }
  .stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  #input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  #num-input { width: 90px; }
  button { cursor: pointer; }
  #msg { font-size: 13px; color: var(--color-text-secondary); min-height: 20px; margin-bottom: 6px; }
  #msg.good { color: var(--color-text-success); }
  #msg.bad { color: var(--color-text-danger); }
  #canvas-wrap { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-secondary); overflow: hidden; }
  canvas { display: block; }
  #history { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; }
  #history span { margin-right: 4px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; margin: 2px 2px; }
  .pill-r { background: #E24B4A; color: #fff; }
  .pill-b { background: #3d3d3a; color: #fff; }
  #level-bar { display: flex; gap: 6px; align-items: center; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; }
  #progress { flex: 1; height: 6px; background: var(--color-border-tertiary); border-radius: 3px; overflow: hidden; }
  #progress-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.4s; }
  #ops-log { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; min-height: 16px; }
</style>

<div id="game">
  <div id="header">
    <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val" id="score">0</div></div>
    <div class="stat-card"><div class="stat-label">Level</div><div class="stat-val" id="level">1</div></div>
    <div class="stat-card"><div class="stat-label">Nodes</div><div class="stat-val" id="nodes">0</div></div>
    <div class="stat-card"><div class="stat-label">Rotations</div><div class="stat-val" id="rots">0</div></div>
  </div>
  <div id="level-bar">
    <span id="level-txt">Level 1: Insert 5 nodes</span>
    <div id="progress"><div id="progress-fill" style="width:0%"></div></div>
    <span id="level-goal">0/5</span>
  </div>
  <div id="input-row">
    <input type="number" id="num-input" min="1" max="999" placeholder="1–999" />
    <button onclick="insertNode()">Insert</button>
    <button onclick="deleteNode()">Delete</button>
    <button onclick="resetGame()">Reset</button>
    <button onclick="autoInsert()">Auto +</button>
  </div>
  <div id="msg">Insert a number to start!</div>
  <div id="ops-log"></div>
  <div id="canvas-wrap"><canvas id="tree-canvas" width="660" height="340"></canvas></div>
  <div id="history">Inserted: <span id="hist-list"></span></div>
</div>

<script>
const RED = 'RED', BLACK = 'BLACK';
let score = 0, rotations = 0, levelGoal = 5, levelNum = 1, insertCount = 0;
let animQueue = [], animating = false;
let highlightNode = null, highlightTimer = null;

class Node {
  constructor(val) {
    this.val = val; this.color = RED;
    this.left = null; this.right = null; this.parent = null;
  }
}

class RBTree {
  constructor() { this.root = null; this.opLog = []; }

  log(msg) { this.opLog = [msg]; }

  insert(val) {
    this.opLog = [];
    let z = new Node(val);
    let y = null, x = this.root;
    while (x) { y = x; x = val < x.val ? x.left : x.right; }
    z.parent = y;
    if (!y) this.root = z;
    else if (val < y.val) y.left = z;
    else y.right = z;
    this.fixInsert(z);
    return z;
  }

  rotateLeft(x) {
    rotations++;
    document.getElementById('rots').textContent = rotations;
    let y = x.right;
    x.right = y.left;
    if (y.left) y.left.parent = x;
    y.parent = x.parent;
    if (!x.parent) this.root = y;
    else if (x === x.parent.left) x.parent.left = y;
    else x.parent.right = y;
    y.left = x; x.parent = y;
    this.log('Left rotation at ' + x.val);
  }

  rotateRight(x) {
    rotations++;
    document.getElementById('rots').textContent = rotations;
    let y = x.left;
    x.left = y.right;
    if (y.right) y.right.parent = x;
    y.parent = x.parent;
    if (!x.parent) this.root = y;
    else if (x === x.parent.right) x.parent.right = y;
    else x.parent.left = y;
    y.right = x; x.parent = y;
    this.log('Right rotation at ' + x.val);
  }

  fixInsert(z) {
    while (z.parent && z.parent.color === RED) {
      if (z.parent === z.parent.parent?.left) {
        let y = z.parent.parent?.right;
        if (y && y.color === RED) {
          z.parent.color = BLACK; y.color = BLACK;
          z.parent.parent.color = RED; z = z.parent.parent;
          this.log('Recolor');
        } else {
          if (z === z.parent.right) { z = z.parent; this.rotateLeft(z); }
          z.parent.color = BLACK;
          if (z.parent.parent) { z.parent.parent.color = RED; this.rotateRight(z.parent.parent); }
        }
      } else {
        let y = z.parent.parent?.left;
        if (y && y.color === RED) {
          z.parent.color = BLACK; y.color = BLACK;
          z.parent.parent.color = RED; z = z.parent.parent;
          this.log('Recolor');
        } else {
          if (z === z.parent.left) { z = z.parent; this.rotateRight(z); }
          z.parent.color = BLACK;
          if (z.parent.parent) { z.parent.parent.color = RED; this.rotateLeft(z.parent.parent); }
        }
      }
    }
    this.root.color = BLACK;
  }

  delete(val) {
    let z = this.search(this.root, val);
    if (!z) return false;
    this._delete(z); return true;
  }

  search(node, val) {
    if (!node) return null;
    if (val === node.val) return node;
    return val < node.val ? this.search(node.left, val) : this.search(node.right, val);
  }

  transplant(u, v) {
    if (!u.parent) this.root = v;
    else if (u === u.parent.left) u.parent.left = v;
    else u.parent.right = v;
    if (v) v.parent = u.parent;
  }

  minimum(node) { while (node.left) node = node.left; return node; }

  _delete(z) {
    let y = z, yOrigColor = y.color, x, xParent;
    if (!z.left) { x = z.right; xParent = z.parent; this.transplant(z, z.right); }
    else if (!z.right) { x = z.left; xParent = z.parent; this.transplant(z, z.left); }
    else {
      y = this.minimum(z.right); yOrigColor = y.color; x = y.right;
      if (y.parent === z) { xParent = y; }
      else { xParent = y.parent; this.transplant(y, y.right); y.right = z.right; y.right.parent = y; }
      this.transplant(z, y); y.left = z.left; y.left.parent = y; y.color = z.color;
    }
    if (yOrigColor === BLACK) this.fixDelete(x, xParent);
    this.log('Deleted ' + z.val);
  }

  fixDelete(x, xParent) {
    while (x !== this.root && (!x || x.color === BLACK)) {
      if (x === xParent?.left) {
        let w = xParent.right;
        if (w && w.color === RED) { w.color = BLACK; xParent.color = RED; this.rotateLeft(xParent); w = xParent.right; }
        if ((!w?.left || w.left.color === BLACK) && (!w?.right || w.right.color === BLACK)) {
          if (w) w.color = RED; x = xParent; xParent = x.parent;
        } else {
          if (!w?.right || w.right.color === BLACK) { if (w?.left) w.left.color = BLACK; if (w) w.color = RED; this.rotateRight(w); w = xParent.right; }
          if (w) { w.color = xParent.color; if (w.right) w.right.color = BLACK; }
          xParent.color = BLACK; this.rotateLeft(xParent); x = this.root;
        }
      } else {
        let w = xParent?.left;
        if (w && w.color === RED) { w.color = BLACK; xParent.color = RED; this.rotateRight(xParent); w = xParent.left; }
        if ((!w?.right || w.right.color === BLACK) && (!w?.left || w.left.color === BLACK)) {
          if (w) w.color = RED; x = xParent; xParent = x.parent;
        } else {
          if (!w?.left || w.left.color === BLACK) { if (w?.right) w.right.color = BLACK; if (w) w.color = RED; this.rotateLeft(w); w = xParent.left; }
          if (w) { w.color = xParent.color; if (w.left) w.left.color = BLACK; }
          xParent.color = BLACK; this.rotateRight(xParent); x = this.root;
        }
      }
    }
    if (x) x.color = BLACK;
  }

  size(node = this.root) { if (!node) return 0; return 1 + this.size(node.left) + this.size(node.right); }
}

const tree = new RBTree();
const insertedVals = [];
const canvas = document.getElementById('tree-canvas');
const ctx = canvas.getContext('2d');

function countNodes(n) { if (!n) return 0; return 1 + countNodes(n.left) + countNodes(n.right); }
function treeHeight(n) { if (!n) return 0; return 1 + Math.max(treeHeight(n.left), treeHeight(n.right)); }

function drawTree() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!tree.root) { ctx.fillStyle = 'var(--color-text-secondary)'; ctx.font = '14px var(--font-sans)'; ctx.textAlign = 'center'; ctx.fillText('Tree is empty — insert a number!', 330, 170); return; }
  const h = treeHeight(tree.root);
  const nodeR = Math.max(14, Math.min(22, 38 - h * 2));
  drawNode(tree.root, 330, 30, 280 / Math.max(1, h - 1), nodeR, h);
}

function drawNode(node, x, y, xOff, r, depth) {
  if (!node) return;
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isHL = highlightNode === node;

  if (node.left) {
    let cx = x - xOff, cy = y + 55;
    ctx.beginPath(); ctx.moveTo(x, y + r); ctx.lineTo(cx, cy - r);
    ctx.strokeStyle = isDark ? '#666' : '#bbb'; ctx.lineWidth = 1.5; ctx.stroke();
    drawNode(node.left, cx, cy, xOff * 0.55, r, depth);
  }
  if (node.right) {
    let cx = x + xOff, cy = y + 55;
    ctx.beginPath(); ctx.moveTo(x, y + r); ctx.lineTo(cx, cy - r);
    ctx.strokeStyle = isDark ? '#666' : '#bbb'; ctx.lineWidth = 1.5; ctx.stroke();
    drawNode(node.right, cx, cy, xOff * 0.55, r, depth);
  }

  if (isHL) { ctx.beginPath(); ctx.arc(x, y, r + 5, 0, Math.PI * 2); ctx.fillStyle = '#F2A623'; ctx.fill(); }

  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = node.color === RED ? '#E24B4A' : (isDark ? '#4a4a4a' : '#3d3d3a');
  ctx.fill();
  ctx.strokeStyle = node.color === RED ? '#A32D2D' : (isDark ? '#888' : '#222');
  ctx.lineWidth = 1.5; ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = `${Math.max(10, r - 4)}px var(--font-sans)`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(node.val, x, y);
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = levelNum;
  document.getElementById('nodes').textContent = countNodes(tree.root);
  const pct = Math.min(100, (insertCount / levelGoal) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('level-goal').textContent = insertCount + '/' + levelGoal;
  document.getElementById('level-txt').textContent = 'Level ' + levelNum + ': Insert ' + levelGoal + ' nodes';
}

function setMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt; el.className = type || '';
}

function setOps(txt) { document.getElementById('ops-log').textContent = txt; }

function insertNode() {
  const inp = document.getElementById('num-input');
  const val = parseInt(inp.value);
  if (isNaN(val) || val < 1 || val > 999) { setMsg('Enter a number between 1 and 999.', 'bad'); return; }
  if (tree.search(tree.root, val)) { setMsg(val + ' already in tree!', 'bad'); return; }

  const newNode = tree.insert(val);
  insertedVals.push(val);
  insertCount++;
  score += 10 + levelNum * 5;
  inp.value = '';

  highlightNode = newNode;
  clearTimeout(highlightTimer);
  highlightTimer = setTimeout(() => { highlightNode = null; drawTree(); }, 800);

  setMsg('Inserted ' + val + '!', 'good');
  setOps(tree.opLog.length ? tree.opLog[0] : '');

  updateHist();
  updateStats();
  drawTree();

  if (insertCount >= levelGoal) {
    setTimeout(() => {
      levelNum++;
      levelGoal += 3;
      score += 50 * levelNum;
      setMsg('Level ' + levelNum + ' reached! +' + (50 * levelNum) + ' bonus!', 'good');
      document.getElementById('level-goal').textContent = insertCount + '/' + levelGoal;
      updateStats();
    }, 600);
  }
}

function deleteNode() {
  const inp = document.getElementById('num-input');
  const val = parseInt(inp.value);
  if (isNaN(val)) { setMsg('Enter a number to delete.', 'bad'); return; }
  if (!tree.delete(val)) { setMsg(val + ' not found in tree.', 'bad'); return; }
  const idx = insertedVals.indexOf(val);
  if (idx > -1) insertedVals.splice(idx, 1);
  score = Math.max(0, score - 5);
  setMsg('Deleted ' + val, '');
  setOps(tree.opLog[0] || '');
  updateHist(); updateStats(); drawTree();
}

function resetGame() {
  tree.root = null; insertedVals.length = 0;
  score = 0; rotations = 0; levelNum = 1; levelGoal = 5; insertCount = 0;
  highlightNode = null;
  document.getElementById('rots').textContent = 0;
  setMsg('Game reset! Insert numbers to build the tree.', '');
  setOps('');
  updateHist(); updateStats(); drawTree();
}

function autoInsert() {
  let val;
  let tries = 0;
  do { val = Math.floor(Math.random() * 99) + 1; tries++; }
  while (tree.search(tree.root, val) && tries < 200);
  if (tries >= 200) { setMsg('Tree is very full!', 'bad'); return; }
  document.getElementById('num-input').value = val;
  insertNode();
}

function updateHist() {
  const el = document.getElementById('hist-list');
  el.innerHTML = insertedVals.slice(-18).map(v => {
    const n = tree.search(tree.root, v);
    const cls = n ? (n.color === RED ? 'pill pill-r' : 'pill pill-b') : '';
    return cls ? `<span class="${cls}">${v}</span>` : '';
  }).join('');
}

document.getElementById('num-input').addEventListener('keydown', e => { if (e.key === 'Enter') insertNode(); });
updateStats(); drawTree();
</script>
